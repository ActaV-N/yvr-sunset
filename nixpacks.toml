# Nixpacks 명시 config — Chrome Headless Shell 시스템 의존성 + 빌드 시점
# Chrome 미리 받기. style-api 의 동일 패턴을 Node/Remotion 환경에 맞게 이식.
#
# 왜 명시 nixpacks.toml?
#   1. NIXPACKS_APT_PKGS 환경변수가 provider 에 따라 무시되는 케이스 발견됨.
#      파일로 명시하면 항상 honor.
#   2. Chrome 의 system libs 를 한 곳에 모아 둠 — Remotion 업글로 Headless
#      Shell 버전이 바뀌어도 의존성은 안정.
#
# 적용: Railway 대시보드 → 각 service → Settings → Config Path 에 railway.*.toml
#       지정. nixpacks.toml 은 자동 인식.

# ── Setup: 시스템 라이브러리 ─────────────────────────────────────────────
# Remotion 의 chrome-headless-shell 이 요구하는 의존성.
# Playwright/Puppeteer 와 거의 동일하나 xvfb 는 불필요 (Remotion 은 완전 headless).
[phases.setup]
aptPkgs = [
  # core
  'libglib2.0-0',
  'libnss3',
  'libnspr4',
  'libdbus-1-3',
  'libatk1.0-0',
  'libatk-bridge2.0-0',
  'libatspi2.0-0',
  'libcups2',
  'libdrm2',
  # X11
  'libxkbcommon0',
  'libxcomposite1',
  'libxdamage1',
  'libxfixes3',
  'libxrandr2',
  'libxext6',
  'libxshmfence1',
  # GPU / render
  'libgbm1',
  'libpango-1.0-0',
  'libcairo2',
  'libgtk-3-0',
  # audio — Ubuntu 24.04 noble 의 time_t 64-bit transition 으로 libasound2 → libasound2t64.
  'libasound2t64',
  # fonts — Fraunces / Inter Tight 는 Google Fonts 에서 fetch (bundle 시점),
  # fallback 으로 Liberation + emoji.
  'fonts-liberation',
  'fonts-noto-color-emoji',
]

# ── Install phase: nixpacks 자동 ────────────────────────────────────────
# package.json + package-lock.json 감지 → `npm ci` 자동. override 하면 깨질 위험.

# ── Build phase: Chrome Headless Shell 미리 받기 ────────────────────────
# 이걸 안 하면 cron tick 마다 ~93MB 재다운로드 + ~30s overhead +
# remotion.dev CDN 의존. Build 단계에서 한 번 받아 이미지에 박아둠.
# `scripts/warmup.ts` 가 `ensureBrowser({ chromeMode: 'headless-shell' })` 만 호출.
[phases.build]
cmds = [
  'npx tsx scripts/warmup.ts',
]

# ── Start ───────────────────────────────────────────────────────────────
# railway.*.toml 의 startCommand 가 비어있을 때 fallback. cron 서비스는
# 각 toml 이 자체 startCommand 를 지정하므로 이건 명시적으로 안 쓰임.
[start]
cmd = 'npm run daily'
